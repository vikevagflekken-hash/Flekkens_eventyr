name: Deploy til GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v5

      - name: Sett opp Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Installer avhengigheter
        run: npm ci

      - name: Generer steder-data
        run: npm run generer:steder

      - name: Bygg prosjektet
        run: npm run build

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Last opp Pages-artifakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
